syntax = "proto3";

package elephant.spell;

option go_package = "github.com/ttab/elephant-api/spell";

// Check content for spelling errors.
service Check {
  // Text spellchecks a text and returns the misspelled words or phrases.
  rpc Text(TextRequest) returns (TextResponse);
  // Suggestions returns suggestions for a word or phrase.
  rpc Suggestions(SuggestionsRequest) returns (SuggestionsResponse);
}

// Dictionaries is used to manage custom dictionary entries. Custom dictionaries
// can be used to add both words and phrases.
service Dictionaries {
  // SupportedLanguages returns a list of supported languages.
  rpc SupportedLanguages(SupportedLanguagesRequest) returns (SupportedLanguagesResponse);
  // ListDictionaries lists the currently available custom dictionaries.
  rpc ListDictionaries(ListDictionariesRequest) returns (ListDictionariesResponse);
  // ListEntries lists entries in the custom dictionaries.
  rpc ListEntries(ListEntriesRequest) returns (ListEntriesResponse);
  // GetEntry returns the details of a custom word or phrase.
  rpc GetEntry(GetEntryRequest) returns (GetEntryResponse);
  // SetEntry is used to add or update custom dictionary entries.
  rpc SetEntry(SetEntryRequest) returns (SetEntryResponse);
  // SetEntryStatus updates only the moderation status of an entry. It is a
  // lightweight alternative to SetEntry for accept/reject workflows that don't
  // need to round-trip the whole entry.
  rpc SetEntryStatus(SetEntryStatusRequest) returns (SetEntryStatusResponse);
  // DeleteEntry is used to remove an entry.
  rpc DeleteEntry(DeleteEntryRequest) returns (DeleteEntryResponse);
}

message SupportedLanguagesRequest {}

message SupportedLanguagesResponse {
  // Languages that can be used for spellchecking.
  repeated Language languages = 1;
}

message Language {
  // Code for the language.
  string code = 1;
}

message TextRequest {
  // Text to spellcheck.
  repeated string text     = 1;
  // Language to check the text for.
  string language          = 2;
  // Suggestions enables generation of suggestions for misspelled words. In
  // interactive applications this should normally be done by calling the
  // Suggestions method on demand.
  bool suggestions         = 3;
  // CustomOnly limits checks to the custom dictionary, skipping the
  // hunspell pass. Useful when you only want to surface custom writing
  // rules without the noise of hunspell corrections.
  bool custom_only         = 4;
}

message TextResponse {
  repeated Misspelled misspelled = 1;
}

message Misspelled {
  repeated MisspelledEntry entries = 1;
}

message MisspelledEntry {
  // Text that was used in the source text.
  string text                     = 1;
  // Suggestions for replacements.
  repeated Suggestion suggestions = 2;
  // Level is the level of the correction.
  CorrectionLevel level           = 3;
  // Status of the custom entry the correction is based on, e.g. "accepted" or
  // "pending". Empty for corrections that don't originate from a custom entry
  // (such as plain hunspell results). Clients can use this to indicate that a
  // correction comes from an unreviewed (pending) entry.
  string status                   = 4;
}

enum CorrectionLevel {
  LEVEL_UNSPECIFIED = 0;
  LEVEL_ERROR       = 1;
  LEVEL_SUGGESTION  = 2;
}

message SuggestionsRequest {
  // Text is the word or phrase to get suggestions for.
  string text              = 1;
  // Language to get suggestions in.
  string language          = 2;
  // CustomOnly limits suggestions to the custom dictionary, skipping the
  // hunspell pass.
  bool custom_only         = 3;
}

message SuggestionsResponse {
  // Suggestions for replacements.
  repeated Suggestion suggestions = 1;
}

message Suggestion {
  string text        = 1;
  string description = 2;
}

message ListEntriesRequest {
  // Language to list entries for.
  string language = 1;
  // Page to return.
  int64 page      = 2;
  // Query filters entries by a free-text substring, matched against the entry
  // text, its description, and its common mistakes.
  string query    = 3;
  // Status to filter entries by
  string status   = 4;
  // PageSize is the number of entries to return per page. Optional, defaults to
  // 100 when zero.
  int64 page_size = 5;
}

message ListEntriesResponse {
  repeated CustomEntry entries = 1;
}

message CustomEntry {
  // Language the entry is for.
  string language                 = 1;
  // Text is the word (or phrase) itself.
  string text                     = 2;
  // Status of the entry, this is used for moderation.
  string status                   = 3;
  // Description of the entry.
  string description              = 4;
  // CommonMistakes when writing the word or phrase. This is used to pre-filter
  // text that is spell-checked.
  repeated string common_mistakes = 5;
  // Level to use when offering corrections based on this entry. Optional,
  // defaults to LEVEL_ERROR.
  CorrectionLevel level           = 6;
  // Forms is an alternative to the common mistakes -> text pairing and allows
  // the mapping of different forms of the word or phrase to specific
  // replacements.
  map<string, string> forms       = 7;
  // Updated is the last update time in RFC3339 format.
  string updated                  = 8;
  // UpdatedBy is the identity of the party that last updated the entry.
  string updated_by               = 9;
  // CaseSensitive controls whether the entry only matches with the exact
  // casing of its text and common mistakes. Defaults to false (case-insensitive
  // matching), which suits ordinary words; proper nouns should set it to true.
  bool case_sensitive             = 10;
}

message ListDictionariesRequest {}

message ListDictionariesResponse {
  repeated CustomDictionary dictionaries = 1;
}

message CustomDictionary {
  // Language the dictionary is for.
  string language  = 1;
  // EntryCount for the dictionary.
  int64 entry_count = 2;
  // PendingCount is the number of entries awaiting moderation.
  int64 pending_count = 3;
  // RuleCount is the number of pattern rules for the language.
  int64 rule_count = 4;
  // RulePendingCount is the number of rules awaiting moderation.
  int64 rule_pending_count = 5;
}

message GetEntryRequest {
  // Language the entry is for.
  string language = 1;
  // Text is the word or phrase to get the entry for.
  string text     = 2;
}

message GetEntryResponse {
  // Entry information.
  CustomEntry entry = 1;
}


message SetEntryRequest {
  // Entry to set.
  CustomEntry entry = 1;
}

message SetEntryResponse {}

message SetEntryStatusRequest {
  // Language the entry is for.
  string language = 1;
  // Text is the word or phrase to update.
  string text     = 2;
  // Status to set, e.g. "accepted" or "pending".
  string status   = 3;
}

message SetEntryStatusResponse {}

message DeleteEntryRequest {
  // Language the entry is for.
  string language = 1;
  // Text is the word or phrase to delete.
  string text     = 2;
}

message DeleteEntryResponse {}

// Rules manages pattern rules, which match a token pattern rather than literal
// text. They are a separate kind of entity from dictionary words.
service Rules {
  // ListRules lists pattern rules.
  rpc ListRules(ListRulesRequest) returns (ListRulesResponse);
  // GetRule returns the details of a single rule.
  rpc GetRule(GetRuleRequest) returns (GetRuleResponse);
  // SetRule adds or updates a rule.
  rpc SetRule(SetRuleRequest) returns (SetRuleResponse);
  // SetRuleStatus updates only the moderation status of a rule.
  rpc SetRuleStatus(SetRuleStatusRequest) returns (SetRuleStatusResponse);
  // DeleteRule removes a rule.
  rpc DeleteRule(DeleteRuleRequest) returns (DeleteRuleResponse);
}

// Rule is a named token-pattern matcher. The pattern uses a small DSL: literals
// match tokens case-insensitively, ":digit" matches a number, ":word" matches a
// word, and ":gap" / ":gap(N)" match up to N intervening words. Capturing
// tokens (classes and gaps) are referenced in the replacement template as {1},
// {2}, … in order. For example pattern ":digit - :digit" with replacement
// "{1}–{2}" turns "12-15" into "12–15".
message Rule {
  // ID is the sequential primary key of the rule. Zero when creating a new
  // rule; the server assigns it.
  int64 id                   = 14;
  // Language the rule is for.
  string language            = 1;
  // Name is a human-readable label for the rule. It is not unique.
  string name                = 2;
  // Status of the rule, used for moderation.
  string status              = 3;
  // Description shown to editors as context for the correction.
  string description         = 4;
  // Level to use when offering corrections. Optional, defaults to LEVEL_ERROR.
  CorrectionLevel level      = 5;
  // Pattern to match, in the rule DSL.
  string pattern             = 6;
  // Replacement template for the suggestion.
  string replacement         = 7;
  // Before, when set, requires one of these tokens immediately before a match.
  repeated string before     = 8;
  // After, when set, requires one of these tokens immediately after a match.
  repeated string after      = 9;
  // NotBefore suppresses the match when preceded by one of these tokens.
  repeated string not_before = 10;
  // NotAfter suppresses the match when followed by one of these tokens.
  repeated string not_after  = 11;
  // Updated is the last update time in RFC3339 format.
  string updated             = 12;
  // UpdatedBy is the identity of the party that last updated the rule.
  string updated_by          = 13;
  // CaseSensitive matches the pattern and guards with their exact casing when
  // set. Defaults to case-insensitive matching.
  bool case_sensitive        = 15;
}

message ListRulesRequest {
  // Language to list rules for.
  string language = 1;
  // Page to return.
  int64 page      = 2;
  // Query filters rules by a free-text substring, matched against the name,
  // description, pattern and replacement.
  string query    = 3;
  // Status to filter rules by.
  string status   = 4;
  // PageSize is the number of rules per page. Optional, defaults to 100.
  int64 page_size = 5;
}

message ListRulesResponse {
  repeated Rule rules = 1;
}

message GetRuleRequest {
  // ID of the rule to get.
  int64 id = 1;
}

message GetRuleResponse {
  Rule rule = 1;
}

message SetRuleRequest {
  // Rule to set. A zero id creates a new rule; a non-zero id updates the
  // existing rule with that id.
  Rule rule = 1;
}

message SetRuleResponse {
  // ID of the created or updated rule.
  int64 id = 1;
}

message SetRuleStatusRequest {
  // ID of the rule to update.
  int64 id      = 1;
  // Status to set, e.g. "accepted" or "pending".
  string status = 2;
}

message SetRuleStatusResponse {}

message DeleteRuleRequest {
  // ID of the rule to delete.
  int64 id = 1;
}

message DeleteRuleResponse {}
